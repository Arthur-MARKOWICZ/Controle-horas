services:
  - type: web
    name: controle-horas-api
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: SERVER_PORT
        value: "8080"
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  - type: web
    name: controle-horas-web
    runtime: docker
    dockerfilePath: ./Dockerfile.frontend
    dockerContext: .
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
