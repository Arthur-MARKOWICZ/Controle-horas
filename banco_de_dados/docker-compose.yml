services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: controle_horas_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: controle_horas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Montar scripts de inicialização (se houver)
      # - ./init-scripts:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
